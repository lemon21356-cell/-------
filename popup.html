<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 200px; padding: 15px; font-family: 'Malgun Gothic', sans-serif; font-size: 14px; }
    .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .input-row { display: flex; align-items: center; gap: 5px; justify-content: flex-end; }
    input[type="number"] { width: 50px; padding: 3px; border: 1px solid #ccc; border-radius: 4px; }
    /* 스위치 스타일 (이전과 동일) */
    .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
    .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #31d63b; }
    input:checked + .slider:before { transform: translateX(16px); }
  </style>
</head>
<body>
  <div class="row">
    <span>자동 저장 활성화</span>
    <label class="switch">
      <input type="checkbox" id="autoSaveToggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="row">
    <span>저장 간격</span>
    <div class="input-row">
      <input type="number" id="saveInterval" min="1" max="60" value="5">
      <span>분</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
